name: Generate Rule Sets

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mihomo
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${LATEST}/mihomo-linux-amd64-${LATEST}.gz" \
            | gunzip > /usr/local/bin/mihomo
          chmod +x /usr/local/bin/mihomo

      - name: Generate rule sets
        run: go run main.go

      - name: Verify output using mihomo
        run: |
          mihomo convert-ruleset domain yaml dlc.yaml /tmp/dlc_verify.mrs
          echo "mihomo recognized dlc.yaml — $(mihomo convert-ruleset domain mrs /tmp/dlc_verify.mrs /dev/stdout 2>/dev/null | wc -l) domain entries parsed."

      - name: Publish to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin release --depth=1 2>/dev/null || true
          git worktree add ../release release 2>/dev/null \
            || (git branch release origin/release 2>/dev/null || git branch release; \
                git worktree add ../release release)

          # Wipe everything so the release branch only contains generated files
          cd ../release
          git rm -rf . --quiet 2>/dev/null || true

          # Copy only the generated artifacts from the source checkout
          rsync -a "$GITHUB_WORKSPACE/data/" data/
          cp "$GITHUB_WORKSPACE/dlc.yaml" dlc.yaml

          git add data/ dlc.yaml
          git diff --cached --quiet && echo "No changes to publish." && exit 0

          git commit -m "chore: regenerate rule sets ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
          git push origin release
